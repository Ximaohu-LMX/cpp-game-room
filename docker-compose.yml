services:
  mysql:
    image: mysql:8.0
    container_name: cpp-game-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "game"
    ports:
      - "3306:3306"
    volumes:
      - ./config/mysql.sql:/docker-entrypoint-initdb.d/mysql.sql:ro
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: cpp-game-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:

